# Dragon Agent Config
# Copy this to the same folder as dragon_agent.py

# Model settings
model: "openrouter/auto"       # Or: gpt-4o, deepseek-chat, claude-sonnet-4-20250514

# Provider: openai, openrouter, deepseek
# Set the corresponding API key in environment variables:
#   OPENAI_API_KEY, OPENROUTER_API_KEY, or DEEPSEEK_API_KEY
provider: "openrouter"

# Maximum steps before returning
max_steps: 25
